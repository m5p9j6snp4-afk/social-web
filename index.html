<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>登入/註冊</title>
</head>
<body>
<div id="login">
<h3>用戶登入</h3>
<input id="l_user" placeholder="帳號"><br>
<input id="l_pwd" type="password" placeholder="密碼"><br>
<button onclick="login()">登入</button>
</div>
<div id="reg">
<h3>新用戶註冊</h3>
<input id="r_user" placeholder="帳號"><br>
<input id="r_pwd" type="password" placeholder="密碼"><br>
<input id="r_name" placeholder="暱稱"><br>
<button onclick="reg()">註冊</button>
</div>
<script>
let token=localStorage.getItem("token")
if(token)location.href="circle.html"
async function reg(){
 let d={
  username:r_user.value,password:r_pwd.value,nickname:r_name.value
 }
 let res=await fetch("/api/user",{method:"POST",body:JSON.stringify(d)})
 alert(await res.text())
}
async function login(){
 let d={username:l_user.value,password:l_pwd.value}
 let res=await fetch("/api/user/login",{method:"POST",body:JSON.stringify(d)})
 let txt=await res.text()
 if(res.ok){
  localStorage.setItem("token",txt)
  location.href="circle.html"
 }else alert(txt)
}
</script>
</body>
</html>
