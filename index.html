<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>社交登入註冊</title>
<style>
*{margin:10px}
input{padding:6px;width:220px}
button{padding:6px 20px}
</style>
</head>
<body>
<div>
  <h3>新用戶註冊</h3>
  <input id="ru" placeholder="輸入帳號"><br>
  <input id="rp" placeholder="輸入密碼"><br>
  <input id="rn" placeholder="輸入暱稱"><br>
  <button onclick="reg()">立即註冊</button>

  <h3>帳號登入</h3>
  <input id="lu" placeholder="帳號"><br>
  <input id="lp" placeholder="密碼"><br>
  <button onclick="login()">登入</button>
</div>
<script>
//固定你的后端API地址
const API = "https://social-api.bmk4byvf9b.workers.dev/api/user"
//註冊
async function reg(){
  let data={
    username:ru.value,
    password:rp.value,
    nickname:rn.value
  }
  let res=await fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  })
  alert(await res.text())
}
//登入
async function login(){
  let data={username:lu.value,password:lp.value}
  let res=await fetch(API+"?login",{
    method:"POST",
    body:JSON.stringify(data)
  })
  let token=await res.text()
  if(!isNaN(token)){
    localStorage.setItem("uid",token)
    alert("登入成功，ID："+token)
    //登入成功跳聊天主頁（後續做微信風格聊天頁）
  }else{
    alert(token)
  }
}
</script>
</body>
</html>
