<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoAI - 香港大學生專屬智能炒幣平台</title>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; }
        .badge { background-color: #ff9900; color: black; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        h1 { color: #00ffcc; font-size: 2.5rem; }
        .promo { background: linear-gradient(45deg, #1f2937, #111827); border: 2px solid #00ffcc; padding: 30px; border-radius: 15px; max-width: 500px; margin: 30px auto; }
        .btn { background-color: #00ffcc; color: #000; font-size: 1.2rem; font-weight: bold; padding: 15px 30px; border: none; border-radius: 25px; cursor: pointer; text-decoration: none; display: inline-block; box-shadow: 0 0 15px #00ffcc; }
        .btn:hover { background-color: #ffffff; box-shadow: 0 0 25px #ffffff; }
        .ticker { color: #888; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div><span class="badge">🔥 限時福利</span></div>
    <h1>CryptoAI 智能投資系統</h1>
    <p style="font-size: 1.2rem;">香港大專生專屬！利用最新 AI 漏洞，自動捕捉比特幣波動！</p>

    <div class="promo">
        <h3>💰 學生專享高回報計劃</h3>
        <p style="font-size: 1.5rem; color: #ff3366; font-weight: bold;">每日穩賺 15% 回報！</p>
        <p>只需入金 $500 HKD，AI 機器人自動幫你利滾利，下週即買 iPhone！</p>
        <p style="color: #00ffcc;">⚡ 今日已有 1,420 位香港大學生成功提現！</p>
        
        <!-- 模擬點擊按鈕 -->
        <button id="trapBtn" class="btn">立即登記 / 領取 $100 體驗金</button>
    </div>

    <div class="ticker">
        * 聲明：本平台受虛擬資產安全保障（假）* <br>
        陳同學剛剛提現了 $4,500 HKD | 張同學剛剛提现了 $8,000 HKD
    </div>

    <script>
        // 安全核心：點擊後不收集數據，直接跳轉到教育頁面
        document.getElementById("trapBtn").addEventListener("click", function() {
            window.location.href = "education.html";
        });
    </script>
</body>
</html>
