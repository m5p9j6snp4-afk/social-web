<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全性認證 - CryptoAI</title>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: Arial, sans-serif; padding: 30px 20px; }
        .steps { display: flex; justify-content: center; margin-bottom: 30px; font-size: 0.9rem; color: #888; }
        .steps .active { color: #00ffcc; font-weight: bold; }
        .box { background-color: #161b22; border: 1px solid #30363d; padding: 25px; border-radius: 10px; max-width: 450px; margin: 0 auto; text-align: left; }
        h2 { text-align: center; color: #00ffcc; margin-top: 0; }
        .alert-text { color: #ff9900; font-size: 0.85rem; margin-bottom: 20px; border-left: 3px solid #ff9900; padding-left: 10px; }
        .fake-input { background-color: #21262d; border: 1px solid #30363d; padding: 12px; border-radius: 6px; margin-bottom: 15px; color: #888; font-size: 0.95rem; cursor: not-allowed; }
        .label { font-size: 0.9rem; margin-bottom: 5px; color: #c9d1d9; display: block; }
        .btn { background-color: #00ffcc; color: #000; font-size: 1.1rem; font-weight: bold; padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:hover { background-color: #ffffff; }
    </style>
</head>
<body>

    <div class="steps">
        <span>1. 點擊領取 ➡️ </span>
        <span class="active">【2. 身份與驗證資產】</span>
        <span> ➡️ 3. 提現成功</span>
    </div>

    <div class="box">
        <h2>🔒 帳戶提現認證</h2>
        <p class="alert-text">提示：根據本港最新虛擬資產監管要求，領取 $100 體驗金前，必須先驗證您的身份及用於接收獲利的信用卡/儲值卡（如 PayMe/八達通）。</p>
        
        <span class="label">真實姓名：</span>
        <div class="fake-input">（已根據您的登入狀態自動加密）</div>

        <span class="label">香港身份證號碼 (HKID)：</span>
        <div class="fake-input">Z123456(X)</div>

        <span class="label">用於收款的信用卡號碼 (或轉數快 FPS 識別碼)：</span>
        <div class="fake-input">4514 •••• •••• 8888</div>

        <span class="label">信用卡安全碼 (CVV) / 驗證碼：</span>
        <div class="fake-input">***</div>

        <p style="font-size: 0.8rem; color: #888; text-align: center;">點擊下方按鈕，即代表您同意本平台的服務條款（假）。</p>
        
        <button id="nextBtn" class="btn">確認認證並提現 $100 ➡️</button>
    </div>

    <script>
        // 點擊後正式進入反轉教育頁面
        document.getElementById("nextBtn").addEventListener("click", function() {
            window.location.href = "education.html";
        });
    </script>
</body>
</html>
